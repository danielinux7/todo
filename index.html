<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="A tiny boards › lists › tasks todo app — pure HTML/CSS/JS, saved in your browser. No server, no signup, no dependencies.">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%232563eb'/><path d='M8 16.5l5 5L24 10' fill='none' stroke='%23fff' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<title>TODO</title>
<style>
  html { color-scheme: light dark; }
  :root, :root[data-theme="light"] { --bg:#fff; --fg:#222; --muted:#999; --border:#ddd; --field:#fff; --accent:#2563eb; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#181818; --fg:#e6e6e6; --muted:#888; --border:#3a3a3a; --field:#242424; --accent:#3b82f6; }
  }
  :root[data-theme="dark"] { --bg:#181818; --fg:#e6e6e6; --muted:#888; --border:#3a3a3a; --field:#242424; --accent:#3b82f6; }
  body { font: 16px/1.5 system-ui, sans-serif; max-width: 72rem; margin: 1rem auto;
    padding: 0 max(1.5rem, env(safe-area-inset-right)) env(safe-area-inset-bottom) max(1.5rem, env(safe-area-inset-left));
    background: var(--bg); color: var(--fg); }
  h1 { display: flex; align-items: center; flex-wrap: wrap; gap: .4rem; font-size: 1.35rem; margin: .25rem 0 .5rem; }
  #install { font-size: .8rem; padding: .2rem .6rem; border: 1px solid var(--accent); border-radius: 999px; color: var(--accent); }
  #update { position: fixed; left: 50%; bottom: max(1rem, env(safe-area-inset-bottom)); transform: translateX(-50%);
    z-index: 20; opacity: 1; font-size: .9rem; padding: .55rem 1.1rem; border: 0; border-radius: 999px;
    background: var(--accent); color: #fff; box-shadow: 0 3px 12px rgba(0,0,0,.35); }
  h1 .name { letter-spacing: .05em; flex: 0 0 auto; margin-right: auto; }
  #drive { cursor: pointer; background: none; border: 0; opacity: 1; padding: 0 .2rem; display: inline-flex; align-items: center; }
  #drive svg { width: 1.15em; height: 1.15em; display: block; }
  /* Greyed = not synced; full colour = syncing/synced; pulse while in flight. */
  #drive[data-state="connect"] svg, #drive[data-state="err"] svg { filter: grayscale(1); opacity: .5; }
  #drive[data-state="sync"] svg { animation: drivepulse 1s ease-in-out infinite; }
  @keyframes drivepulse { 50% { opacity: .35; } }
  #theme { cursor: pointer; background: none; border: 0; color: inherit; font-size: 1.3rem; padding: 0 0 0 .5rem; }
  h2 { display: flex; align-items: center; gap: .3rem; font-size: 1.05rem; margin: 0 0 .2rem; }
  ul { list-style: none; padding: 0; margin: 0; }
  li { display: flex; align-items: center; gap: .3rem; padding: .15rem 0; }
  li.empty { color: var(--muted); font-style: italic; }
  .name, .text { flex: 1; }
  li.done .text { text-decoration: line-through; color: var(--muted); }
  .grip { cursor: grab; opacity: .35; touch-action: none; }
  .drag { opacity: .4; }
  /* Don't let a drag start a text selection (the highlight); re-enable while editing. */
  #pills .tab, #lists section, ul[data-list] li { -webkit-user-select: none; user-select: none; }
  .editing, [contenteditable="true"] { -webkit-user-select: text; user-select: text; }
  button { cursor: pointer; background: none; border: 0; font: inherit; padding: .15rem .25rem; color: inherit; opacity: .7; }
  button:hover { opacity: 1; }
  #toolbar { display: flex; align-items: center; flex-wrap: wrap; gap: .15rem; margin: 1rem 0; padding: .3rem .4rem;
    border: 1px solid var(--border); border-radius: .4rem; width: max-content; max-width: 100%; }
  @media (max-width: 600px) {
    #toolbar { width: auto; gap: .25rem; padding: .25rem; margin: .6rem 0; }
    #toolbar .bar { display: none; }
    #toolbar button { padding: 0; width: 1.9rem; height: 1.9rem; font-size: .95rem;
      border: 1px solid var(--border); border-radius: .35rem;
      display: flex; align-items: center; justify-content: center; }
    #toolbar .io svg { width: 1.05em; height: 1.05em; }
  }
  #toolbar button { font-size: 1.15rem; opacity: 1; padding: .25rem .5rem; border-radius: .3rem; }
  #toolbar button:not(:disabled):hover { background: var(--field); }
  #toolbar button:disabled { opacity: .25; cursor: default; }
  #toolbar .io { color: var(--accent); }
  #toolbar .io svg { width: 1.15em; height: 1.15em; display: block; }
  #toolbar .bar { width: 1px; align-self: stretch; background: var(--border); margin: .15rem .3rem; }
  [data-kind] { cursor: pointer; }
  .selected { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: .2rem; }
  .editing { outline: 2px solid var(--accent); background: var(--field); cursor: text;
    border-radius: .2rem; padding: 0 .25rem; min-width: 5rem; }
  .newedit { flex: 1; min-width: 5rem; }
  h2 .newedit, #boardhead .newedit { font-weight: 600; }
  #pills { display: flex; flex-wrap: wrap; gap: .4rem; margin: 1rem 0; }
  .tab { padding: .25rem .7rem; border: 1px solid var(--border); border-radius: 999px; background: none; color: inherit; cursor: pointer; opacity: 1; touch-action: none; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #boardhead { display: flex; align-items: center; gap: .3rem; margin: .5rem 0; font-size: 1.3rem; }
  #boardhead .name { font-weight: 600; }
  section { border-top: 1px solid var(--border); padding-top: .35rem; margin-top: .9rem; }
</style>
<script>var s=localStorage.getItem('theme');if(s)document.documentElement.setAttribute('data-theme',s);</script>

<h1><span class="name">TODO</span>
  <button id="install" type="button" hidden>Install app</button>
  <button id="drive" type="button" title="Sync with Google Drive" data-state="connect"><svg viewBox="0 0 87.3 78" aria-hidden="true"><path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/><path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/><path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/><path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/><path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/><path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/></svg></button>
  <button id="theme" type="button" title="toggle light/dark">&#9681;</button></h1>
<input type="file" id="file" accept="application/json,.json" hidden>
<div id="app"></div>
<button id="update" type="button" hidden>New version &mdash; refresh</button>

<script>
"use strict";
// ── Pure client-side TODO: boards > lists > tasks, in localStorage. No server. ──
const KEY = 'todo.data', HISTORY = 10;
const SEED = {
  Work: {
    "In progress": [
      {text: "Wire up the auth flow", done: false},
      {text: "Review Dana's PR", done: true},
      {text: "Draft the launch email", done: false},
    ],
    Backlog: [
      {text: "Migrate the old logs", done: false},
      {text: "Spike: search ranking", done: false},
    ],
  },
  Home: {
    Errands: [
      {text: "Pick up dry cleaning", done: true},
      {text: "Book dentist", done: false},
    ],
    Groceries: [
      {text: "Oat milk", done: false},
      {text: "Coffee beans", done: false},
      {text: "Tomatoes", done: false},
    ],
  },
};

const clone = x => JSON.parse(JSON.stringify(x));
const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
  .replace(/>/g, '&gt;').replace(/"/g, '&quot;');

function load() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch { return {}; } }
function save() { localStorage.setItem(KEY, JSON.stringify(data)); }

// Drive sync (below) hooks in here: every local change stamps a rev so the newest
// edit wins across devices. The seed deliberately doesn't stamp — see touched().
const REV = 'todo.rev';
let localRev = +localStorage.getItem(REV) || 0;
let onChange = null;
function touched() { localRev = Date.now(); localStorage.setItem(REV, localRev); if (onChange) onChange(); }

let data = load();
if (!Object.keys(data).length) { data = clone(SEED); save(); }
let active = Object.keys(data)[0] || '';
let sel = null;
const UNDO = [], REDO = [];

// ── Mutations record a whole-document snapshot for undo (always correct, tiny). ──
function mutate(fn) {
  const before = clone(data);
  fn();
  if (JSON.stringify(data) !== JSON.stringify(before)) {
    UNDO.push(before); if (UNDO.length > HISTORY) UNDO.shift(); REDO.length = 0;
    save(); touched();
  }
  render();
}
function undo() { if (!UNDO.length) return; REDO.push(clone(data)); data = UNDO.pop(); save(); touched(); render(); }
function redo() { if (!REDO.length) return; UNDO.push(clone(data)); data = REDO.pop(); save(); touched(); render(); }

// ── Ordered-dict helpers (boards and lists are ordered objects). ──
function moveKey(obj, name, dir) {
  const keys = Object.keys(obj), i = keys.indexOf(name);
  if (i < 0 || (dir !== 'up' && dir !== 'down')) return obj;
  const j = dir === 'up' ? i - 1 : i + 1;
  if (j < 0 || j >= keys.length) return obj;
  [keys[i], keys[j]] = [keys[j], keys[i]];
  const out = {}; keys.forEach(k => out[k] = obj[k]); return out;
}
function renameKey(obj, old, nw) {
  nw = nw.trim();
  if (!(old in obj) || !nw || (nw !== old && nw in obj)) return obj;
  const out = {}; for (const k in obj) out[k === old ? nw : k] = obj[k]; return out;
}
function copyKey(obj, name) {
  if (!(name in obj)) return obj;
  let nn = name + ' copy', i = 2;
  while (nn in obj) { nn = `${name} copy ${i}`; i++; }
  const out = {}; for (const k in obj) { out[k] = obj[k]; if (k === name) out[nn] = clone(obj[name]); }
  return out;
}
function orderKeys(obj, names) {
  const cur = Object.keys(obj);
  if (names.length !== cur.length ||
      [...names].sort().join('\n') !== [...cur].sort().join('\n')) return obj;
  const out = {}; names.forEach(k => out[k] = obj[k]); return out;
}

// ── Operations on a {kind, board, list, n} target. ──
const dsOf = el => ({ kind: el.dataset.kind, board: el.dataset.board || '',
  list: el.dataset.list || '', n: +el.dataset.n || 0 });
const target = () => sel ? dsOf(sel) : { kind: 'board', board: active, list: '', n: 0 };

function del(t) {
  if (t.kind === 'board') { delete data[t.board]; if (t.board === active) active = Object.keys(data)[0] || ''; }
  else if (t.kind === 'list') delete data[t.board][t.list];
  else data[t.board][t.list].splice(t.n - 1, 1);
}
function dup(t) {
  if (t.kind === 'board') data = copyKey(data, t.board);
  else if (t.kind === 'list') data[t.board] = copyKey(data[t.board], t.list);
  else { const a = data[t.board][t.list]; a.splice(t.n, 0, clone(a[t.n - 1])); }
}
function move(t, dir) {
  if (t.kind === 'board') data = moveKey(data, t.board, dir);
  else if (t.kind === 'list') data[t.board] = moveKey(data[t.board], t.list, dir);
  else { const a = data[t.board][t.list], i = t.n - 1, j = dir === 'up' ? i - 1 : i + 1;
    if (j >= 0 && j < a.length) [a[i], a[j]] = [a[j], a[i]]; }
}
function edit(t, text) {
  text = text.trim();
  if (t.kind === 'board') { const nd = renameKey(data, t.board, text);
    if (nd !== data) { if (active === t.board) active = text; data = nd; } }
  else if (t.kind === 'list') data[t.board] = renameKey(data[t.board], t.list, text);
  else if (text) { const a = data[t.board][t.list]; a[t.n - 1] = { ...a[t.n - 1], text }; }
}
function addBoard(name) { name = name.trim(); if (name && !(name in data)) { data[name] = {}; active = name; } }
function addList(board, name) { name = name.trim(); if (name && !(name in data[board])) data[board][name] = []; }
function addTask(board, list, text) { text = text.trim(); if (text) data[board][list].push({ text, done: false }); }
function toggleDone(board, list, n) { const t = data[board][list][n - 1]; t.done = !t.done; }
function reorderTasks(board, list, idx) {
  const a = data[board][list], ni = idx.map(x => +x - 1);
  if ([...ni].sort((x, y) => x - y).join(',') !== a.map((_, i) => i).join(',')) return;
  data[board][list] = ni.map(i => a[i]);
}
// Subtree for clipboard copy: board+lists+tasks / list+tasks / a single task.
function subtree(t) {
  if (!t || t.kind === 'board') { const b = (t && t.board) || active; return { [b]: data[b] }; }
  if (t.kind === 'list') return { [t.list]: data[t.board][t.list] };
  return data[t.board][t.list][t.n - 1];
}

// ── Export / Import the whole tree as JSON (same shape as the CLI's todos.json). ──
function exportJson() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
  a.download = 'todo.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
// Shape check at the trust boundary: { board: { list: [tasks] } }.
function isTree(x) {
  return x && typeof x === 'object' && !Array.isArray(x) &&
    Object.values(x).every(lists => lists && typeof lists === 'object' && !Array.isArray(lists) &&
      Object.values(lists).every(Array.isArray));
}
// Merge incoming into current: add missing boards/lists, append tasks not already
// present (by text). Idempotent on re-import; defensively coerces each task.
function mergeTree(into, incoming) {
  for (const [b, lists] of Object.entries(incoming)) {
    if (!(b in into)) into[b] = {};
    for (const [l, tasks] of Object.entries(lists)) {
      if (!(l in into[b])) into[b][l] = [];
      const have = new Set(into[b][l].map(t => t.text));
      for (const t of tasks) {
        const text = String((t && t.text) || '').trim();
        if (text && !have.has(text)) { into[b][l].push({ text, done: !!(t && t.done) }); have.add(text); }
      }
    }
  }
}
function importJson(text) {
  let incoming;
  try { incoming = JSON.parse(text); } catch { alert('That file is not valid JSON.'); return; }
  if (!isTree(incoming)) { alert('Expected JSON shaped like { board: { list: [ {text, done} ] } }.'); return; }
  mutate(() => { mergeTree(data, incoming); const k = Object.keys(incoming)[0]; if (k) active = k; });
}

// ── Render the whole app from `data`; selection resets each render. ──
function render() {
  if (!(active in data)) active = Object.keys(data)[0] || '';
  const toolbar = `<div id="toolbar">
    <button id="t-undo" type="button" title="Undo" ${UNDO.length ? '' : 'disabled'}>&#8634;</button>
    <button id="t-redo" type="button" title="Redo" ${REDO.length ? '' : 'disabled'}>&#8635;</button>
    <span class="bar"></span>
    <button id="t-add" type="button" title="Add (board / list / task by what's selected)">&#43;</button>
    <button id="t-up" type="button" title="Move up" disabled>&#8593;</button>
    <button id="t-down" type="button" title="Move down" disabled>&#8595;</button>
    <span class="bar"></span>
    <button id="t-edit" type="button" title="Edit inline" disabled>&#9998;</button>
    <button id="t-dup" type="button" title="Duplicate (current board if none selected)">&#10697;</button>
    <button id="t-clip" type="button" title="Copy to clipboard (current board if none selected)">&#128203;</button>
    <button id="t-del" type="button" title="Delete (current board if none selected)">&#128465;</button>
    <span class="bar"></span>
    <button id="t-import" class="io" type="button" title="Import JSON (merge into your boards)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v11"/><path d="M7.5 9.5 12 14l4.5-4.5"/><path d="M4 20h16"/></svg></button>
    <button id="t-export" class="io" type="button" title="Export all boards as JSON"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V10"/><path d="M7.5 14.5 12 10l4.5 4.5"/><path d="M4 4h16"/></svg></button>
  </div>`;

  const pills = Object.keys(data).map(b =>
    `<button class="tab${b === active ? ' active' : ''}" data-name="${esc(b)}">${esc(b)}</button>`
  ).join('');
  const pillsHtml = pills ? `<nav id="pills">${pills}</nav>` : '';

  let boardHtml;
  if (active) {
    const eb = esc(active);
    const sections = Object.entries(data[active]).map(([name, tasks]) => {
      const el = esc(name);
      const items = tasks.length ? tasks.map((t, i) => {
        const n = i + 1, et = esc(t.text);
        return `<li class="${t.done ? 'done' : ''}" data-n="${n}">
          <span class="grip" title="drag to reorder">&#10303;</span>
          <button class="box" data-board="${eb}" data-list="${el}" data-n="${n}" title="toggle">${t.done ? '&#9745;' : '&#9744;'}</button>
          <span class="text" data-kind="item" data-board="${eb}" data-list="${el}" data-n="${n}" data-text="${et}">${et}</span>
        </li>`;
      }).join('') : '<li class="empty">empty</li>';
      return `<section data-list="${el}">
        <h2><span class="grip listgrip" title="drag to reorder">&#10303;</span>
          <span class="name" data-kind="list" data-board="${eb}" data-list="${el}">${el}</span></h2>
        <ul data-board="${eb}" data-list="${el}">${items}</ul>
      </section>`;
    }).join('') || '<p>No lists yet. Add one above.</p>';
    boardHtml = `<div id="board"><div id="boardhead">
      <span class="name" data-kind="board" data-board="${eb}">${eb}</span></div>
      <div id="lists" data-board="${eb}">${sections}</div></div>`;
  } else {
    boardHtml = '<p>Create a board to get started.</p>';
  }

  document.getElementById('app').innerHTML = toolbar + pillsHtml + boardHtml;
  bindAll();
}

// ── Inline editor: new and existing elements share one commit rule. ──
// empty -> delete (added: discard; existing: remove). Enter/blur commit, Esc cancels.
function inlineEdit(el, isAdd) {
  const orig = isAdd ? '' : (el.dataset.text ?? el.dataset.list ?? el.dataset.board);
  el.contentEditable = 'true';
  el.classList.add('editing');
  el.focus();
  const r = document.createRange(); r.selectNodeContents(el);
  const s = getSelection(); s.removeAllRanges(); s.addRange(r);
  let done = false;
  const commit = saveIt => {
    if (done) return; done = true;
    el.contentEditable = 'false'; el.classList.remove('editing');
    const val = el.textContent.trim();
    if (!saveIt) { isAdd ? el.remove() : render(); return; }
    if (isAdd) {
      if (!val) return el.remove();
      const d = el.dataset;
      if (d.add === 'board') mutate(() => addBoard(val));
      else if (d.add === 'list') mutate(() => addList(d.board, val));
      else mutate(() => addTask(d.board, d.list, val));
    } else {
      const t = dsOf(el);
      if (!val) mutate(() => del(t));
      else if (val !== orig) mutate(() => edit(t, val));
      else render();
    }
  };
  el.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    else if (e.key === 'Escape') { e.preventDefault(); commit(false); }
  };
  el.onblur = () => commit(true);
}

const findUl = (board, list) =>
  [...document.querySelectorAll('ul[data-list]')].find(u => u.dataset.board === board && u.dataset.list === list);

// Add: empty inline field as a child of the selection (board->list, list/task->task),
// or a new board when nothing is selected. Empty -> nothing created.
function onAdd() {
  const span = document.createElement('span');
  span.className = 'newedit';
  if (!sel) {
    span.dataset.add = 'board';
    let pills = document.getElementById('pills');
    if (!pills) { pills = document.createElement('nav'); pills.id = 'pills'; document.getElementById('toolbar').after(pills); }
    span.classList.add('tab');
    pills.appendChild(span);
  } else if (sel.dataset.kind === 'board') {
    span.dataset.add = 'list'; span.dataset.board = sel.dataset.board;
    const sec = document.createElement('section'), h = document.createElement('h2');
    h.appendChild(span); sec.appendChild(h);
    document.getElementById('lists').appendChild(sec);
  } else {
    span.dataset.add = 'task'; span.dataset.board = sel.dataset.board; span.dataset.list = sel.dataset.list;
    const li = document.createElement('li'); li.appendChild(span);
    findUl(sel.dataset.board, sel.dataset.list).appendChild(li);
  }
  inlineEdit(span, true);
}

function select(el) {
  if (sel) sel.classList.remove('selected');
  sel = sel === el ? null : el;
  if (sel) sel.classList.add('selected');
  ['t-up', 't-down', 't-edit'].forEach(id => document.getElementById(id).disabled = !sel);
}

// Pointer-based reorder: works for mouse, touch and pen (HTML5 DnD ignores touch).
// Drag starts from `handleSel` (a grip, or the item itself for pills); a small
// move threshold lets plain taps/clicks through. Handles need touch-action:none.
function sortable(container, sel, onDrop, handleSel, horiz) {
  handleSel = handleSel || sel;
  const pos = e => horiz ? e.clientX : e.clientY;
  let dragged = null, start = 0, moved = false;
  container.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (e.target.isContentEditable) return;  // let text editing select normally
    if (!e.target.closest(handleSel)) return;
    const item = e.target.closest(sel);
    if (!item || item.parentElement !== container) return;
    dragged = item; start = pos(e); moved = false;
    // Grip-handle drags: stop the native selection/focus. Pills keep default so taps still switch board.
    if (handleSel !== sel) e.preventDefault();
  });
  container.addEventListener('pointermove', e => {
    if (!dragged) return;
    if (!moved) {
      if (Math.abs(pos(e) - start) < 6) return;
      moved = true; dragged.classList.add('drag');
      try { container.setPointerCapture(e.pointerId); } catch {}
    }
    e.preventDefault();
    const after = [...container.querySelectorAll(sel + ':not(.drag)')].find(el => {
      const r = el.getBoundingClientRect();
      return horiz ? pos(e) < r.left + r.width / 2 : pos(e) < r.top + r.height / 2;
    });
    container.insertBefore(dragged, after || null);
  });
  const end = () => {
    if (!dragged) return;
    const did = moved; dragged.classList.remove('drag'); dragged = null; moved = false;
    if (did) onDrop();
  };
  container.addEventListener('pointerup', end);
  container.addEventListener('pointercancel', end);
}

function bindAll() {
  sel = null;
  const b = id => document.getElementById(id);
  b('t-undo').onclick = undo;
  b('t-redo').onclick = redo;
  b('t-add').onclick = onAdd;
  b('t-up').onclick = () => sel && mutate(() => move(dsOf(sel), 'up'));
  b('t-down').onclick = () => sel && mutate(() => move(dsOf(sel), 'down'));
  b('t-edit').onclick = () => sel && inlineEdit(sel, false);
  b('t-dup').onclick = () => mutate(() => dup(target()));
  b('t-del').onclick = () => mutate(() => del(target()));
  b('t-clip').onclick = () => navigator.clipboard.writeText(JSON.stringify(subtree(sel ? dsOf(sel) : null), null, 2));
  b('t-export').onclick = exportJson;
  b('t-import').onclick = () => document.getElementById('file').click();

  document.querySelectorAll('.box').forEach(box =>
    box.onclick = () => mutate(() => toggleDone(box.dataset.board, box.dataset.list, +box.dataset.n)));
  document.querySelectorAll('#pills .tab').forEach(p =>
    p.onclick = () => { active = p.dataset.name; render(); });
  document.querySelectorAll('[data-kind]').forEach(el =>
    el.onclick = () => { if (!el.isContentEditable) select(el); });

  const pills = document.getElementById('pills');
  if (pills) sortable(pills, '.tab', () => {
    const names = [...pills.querySelectorAll('.tab')].map(t => t.dataset.name);
    mutate(() => { data = orderKeys(data, names); });
  }, null, true);
  const lists = document.getElementById('lists');
  if (lists) sortable(lists, 'section[data-list]', () => {
    const bd = lists.dataset.board, names = [...lists.querySelectorAll('section[data-list]')].map(s => s.dataset.list);
    mutate(() => { data[bd] = orderKeys(data[bd], names); });
  }, '.listgrip');
  document.querySelectorAll('ul[data-list]').forEach(ul => sortable(ul, 'li[data-n]', () => {
    const order = [...ul.querySelectorAll('li[data-n]')].map(li => li.dataset.n);
    mutate(() => reorderTasks(ul.dataset.board, ul.dataset.list, order));
  }));
}

// ── One-time wiring: theme toggle and background-click deselect. ──
const root = document.documentElement;
document.getElementById('theme').onclick = () => {
  const cur = root.getAttribute('data-theme')
    || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  const next = cur === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
};
document.addEventListener('click', e => {
  if (document.querySelector('.editing')) return;
  if (e.target.closest('#toolbar') || e.target.closest('[data-kind]') || e.target.closest('#pills')) return;
  if (sel) select(sel);
});
document.getElementById('file').onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = () => { importJson(r.result); e.target.value = ''; };
  r.readAsText(f);
};

render();
</script>

<script>
// ── PWA: install button + service worker with clean self-update. ──
"use strict";
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const w = reg.installing;
      w.addEventListener('statechange', () => {
        if (w.state === 'installed' && navigator.serviceWorker.controller) {
          const b = document.getElementById('update');
          b.hidden = false;
          b.onclick = () => reg.waiting && reg.waiting.postMessage('skip');
        }
      });
    });
  });
  let reloading;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloading) return; reloading = true; location.reload();
  });
}
let deferredPrompt;
addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  const btn = document.getElementById('install');
  btn.hidden = false;
  btn.onclick = () => { btn.hidden = true; deferredPrompt.prompt(); deferredPrompt = null; };
});
addEventListener('appinstalled', () => document.getElementById('install').hidden = true);
</script>

<script>
// ── Optional Google Drive sync — keeps todo.data in the app's private Drive folder ──
// Personal use: leave the OAuth app in "testing" mode and whitelist your Google
// account(s). Scope is drive.appdata, so we only ever touch our own hidden file —
// never the rest of your Drive. The Google sign-in library loads only once a client
// ID is set, so nobody who hasn't configured this pulls in third-party script.
// ponytail: last-write-wins by the rev timestamp, no merge — right for one user, many devices.
"use strict";
const DRIVE_CLIENT_ID = '1011818309649-4edh6rvvbnl72fuo8q738m3i0vl6ft5s.apps.googleusercontent.com';
const DRIVE_FILE = 'todo.json';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
let tokenClient, accessToken = '', tokenExp = 0, fileId = null, pushTimer;
const driveBtn = document.getElementById('drive');
const driveOn = () => localStorage.getItem('todo.drive') === '1';

function setDrive(state, info) {
  const titles = {
    connect: 'Sync with Google Drive',
    sync:    'Syncing…',
    ok:      'Synced ✓ — click to sync now',
    err:     'Drive: ' + (info || 'error, click to retry'),
  };
  const s = state in titles ? state : 'connect';
  driveBtn.dataset.state = s; driveBtn.title = titles[s];
}

const gisReady = () => window.google && google.accounts && google.accounts.oauth2;
// Resolve with a valid access token; request silently unless interactive (first consent).
function getToken(interactive) {
  return new Promise((resolve, reject) => {
    if (accessToken && Date.now() < tokenExp - 60000) return resolve(accessToken);
    tokenClient.callback = r => {
      if (r.error) return reject(r.error);
      accessToken = r.access_token; tokenExp = Date.now() + (r.expires_in || 3600) * 1000;
      resolve(accessToken);
    };
    tokenClient.requestAccessToken({ prompt: interactive ? 'consent' : '' });
  });
}

async function api(token, url, opts) {
  const r = await fetch(url, { ...opts, headers: { Authorization: 'Bearer ' + token, ...(opts && opts.headers) } });
  if (!r.ok) throw new Error(r.status + ' ' + (await r.text()).slice(0, 120));  // ponytail: no 401 auto-retry; re-click re-auths
  return r;
}
async function findFile(token) {
  const q = encodeURIComponent(`name='${DRIVE_FILE}'`);
  const r = await api(token, `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${q}&fields=files(id,appProperties)&pageSize=1`);
  return (await r.json()).files[0] || null;
}
async function download(token, id) {
  return (await api(token, `https://www.googleapis.com/drive/v3/files/${id}?alt=media`)).text();
}
// Create or update the single appData file; rev rides along as file metadata, not in the JSON.
async function upsert(token, content, rev) {
  const boundary = 'todo' + Date.now();
  const meta = fileId ? { appProperties: { rev: String(rev) } }
                      : { name: DRIVE_FILE, parents: ['appDataFolder'], appProperties: { rev: String(rev) } };
  const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
  const url = fileId
    ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart&fields=id`
    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id`;
  const r = await api(token, url, { method: fileId ? 'PATCH' : 'POST',
    headers: { 'Content-Type': 'multipart/related; boundary=' + boundary }, body });
  fileId = (await r.json()).id;
}

function adopt(remote, rev) {
  data = remote; localRev = rev;
  localStorage.setItem(KEY, JSON.stringify(data));
  localStorage.setItem(REV, rev);
  if (!(active in data)) active = Object.keys(data)[0] || '';
  render();
}

// Pull remote then converge: whichever side's rev is newer wins; create the file if absent.
async function pull() {
  setDrive('sync');
  const token = await getToken(!driveOn());
  const f = await findFile(token);
  if (f) {
    fileId = f.id;
    const remoteRev = +(f.appProperties && f.appProperties.rev) || 0;
    if (remoteRev > localRev) {
      let remote; try { remote = JSON.parse(await download(token, f.id)); } catch { remote = null; }
      if (isTree(remote)) adopt(remote, remoteRev);
    } else if (localRev > remoteRev) {
      await upsert(token, JSON.stringify(data), localRev);
    }
  } else {
    await upsert(token, JSON.stringify(data), localRev);
  }
  localStorage.setItem('todo.drive', '1');
  setDrive('ok');
}

async function push() {
  if (!driveOn()) return;
  setDrive('sync');
  const token = await getToken(false);
  await upsert(token, JSON.stringify(data), localRev);
  setDrive('ok');
}
function schedulePush() {
  if (!driveOn()) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => push().catch(e => setDrive('err', e.message)), 1500);
}

driveBtn.onclick = () => {
  if (!DRIVE_CLIENT_ID) {
    alert('Google Drive sync needs a one-time setup: create an OAuth client ID in Google Cloud, ' +
          'paste it into index.html (DRIVE_CLIENT_ID), and bump the sw.js cache. See the README.');
    return;
  }
  pull().catch(e => setDrive('err', e.message));
};

// Load Google's sign-in library only when configured, then wire up and (if already
// connected) silently re-sync on startup.
function waitGis(n) {
  if (gisReady()) {
    tokenClient = google.accounts.oauth2.initTokenClient({ client_id: DRIVE_CLIENT_ID, scope: DRIVE_SCOPE, callback: () => {} });
    onChange = schedulePush;
    if (driveOn()) pull().catch(() => setDrive('connect')); else setDrive('connect');
  } else if (n < 25) setTimeout(() => waitGis(n + 1), 200);
  else setDrive('err', 'could not load Google sign-in');
}
if (DRIVE_CLIENT_ID) {
  const g = document.createElement('script');
  g.src = 'https://accounts.google.com/gsi/client'; g.async = true;
  document.head.appendChild(g);
  waitGis(0);
} else setDrive('connect');
</script>
